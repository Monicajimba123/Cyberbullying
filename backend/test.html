<!DOCTYPE html>
<html>
<body>
<h2>API Test</h2>

<script>
fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({ text: "you are stupid" })
})
.then(res => res.json())
.then(data => {
    console.log("SUCCESS:", data);
    alert(JSON.stringify(data));
})
.catch(err => {
    console.log("ERROR:", err);
    alert("Error: check console");
});
</script>

</body>
</html>
